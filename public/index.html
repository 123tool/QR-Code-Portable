<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR PORTAL | NODE.JS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #e5e7eb; font-family: 'Courier New', monospace; }
        .brutalist-card { background: white; border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .btn-spy { border: 3px solid #000; box-shadow: 4px 4px 0px #000; transition: 0.1s; cursor: pointer; }
        .btn-spy:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        input, select { border: 3px solid #000; padding: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="brutalist-card p-6 mb-8 bg-yellow-400">
            <h1 class="text-4xl font-black uppercase italic">QR NODE v1.0</h1>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="brutalist-card p-6">
                <label class="font-black block mb-2 uppercase text-xs">Type</label>
                <select id="type" class="mb-4">
                    <option value="text">URL / Text</option>
                    <option value="wa">WhatsApp</option>
                    <option value="wifi">WiFi</option>
                </select>

                <div id="standard">
                    <input type="text" id="value" placeholder="Enter link/text..." class="mb-4">
                </div>
                <div id="wifi" class="hidden">
                    <input type="text" id="ssid" placeholder="WiFi Name" class="mb-2">
                    <input type="text" id="pwd" placeholder="Password" class="mb-4">
                </div>

                <label class="font-black block mb-2 uppercase text-xs">QR Color</label>
                <input type="color" id="qr_color" value="#000000" class="h-12 mb-6">

                <button onclick="generate()" class="btn-spy w-full py-4 bg-green-400 font-black text-xl">GENERATE</button>
            </div>

            <div class="brutalist-card p-6 flex flex-col items-center justify-center min-h-[300px]">
                <div id="qr_container" class="hidden text-center">
                    <img id="qr_img" src="" class="border-4 border-black mb-4 w-64 h-64">
                    <a id="dl_link" href="" download="qr.png" class="font-black underline">DOWNLOAD PNG</a>
                </div>
                <p id="placeholder" class="font-black text-gray-400 italic text-center">Waiting for target...</p>
            </div>
        </div>
    </div>

    <script>
        async function generate() {
            const data = {
                type: document.getElementById('type').value,
                value: document.getElementById('value').value,
                ssid: document.getElementById('ssid').value,
                pwd: document.getElementById('pwd').value,
                color: document.getElementById('qr_color').value
            };

            const res = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if(result.success) {
                document.getElementById('qr_img').src = result.qr;
                document.getElementById('dl_link').href = result.qr;
                document.getElementById('qr_container').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            }
        }

        document.getElementById('type').onchange = (e) => {
            document.getElementById('wifi').classList.toggle('hidden', e.target.value !== 'wifi');
            document.getElementById('standard').classList.toggle('hidden', e.target.value === 'wifi');
        };
    </script>
</body>
</html>
